<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKStream Player Core Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">

    <div class="app-container">
        <header class="app-header">
            <div class="top-bar">
                <div class="brand-zone">
                    <a href="index.html" class="logo-group" style="text-decoration: none; color: inherit;">
                        <div class="logo-circle">MK</div>
                        <h1 class="brand-title">MKStream</h1>
                    </a>
                </div>
                <div class="control-zone" style="margin-left:auto;">
                    <a href="index.html" class="utility-icon-btn" style="color:var(--text-primary); font-size: 20px;"><i class="fa-solid fa-xmark"></i></a>
                </div>
            </div>
        </header>

        <div class="player-root-canvas">
            <aside class="player-sidebar-left">
                <div class="meta-album-card">
                    <h2 class="series-display-title" id="runtimeDisplayTitle" style="color:var(--button-active-accent); font-size:18px; margin-bottom:10px;">Loading Media Assets...</h2>
                    <div class="metadata-lines-box" style="border:none; padding:0; display:flex; flex-direction:column; gap:6px; font-size:12px;">
                        <div class="meta-line" id="metaFormatLine" style="color:var(--text-primary);"><span>Position Element:</span> --</div>
                        <div class="meta-line" id="metaSeasonLine" style="color:var(--text-primary);"><span>Tracking Sequence:</span> --</div>
                    </div>
                </div>
            </aside>

            <main class="player-center-workspace">
                <div class="video-surface-frame">
                    <video id="primaryVideoPlayer" style="display:none;" controls></video>
                    <div id="embeddedFrameHolder" style="display:none; width:100%; height:100%;"></div>
                </div>

                <div style="background:var(--widget-bg); border:1px solid var(--border-color); padding:12px; border-radius:6px; display:flex; flex-wrap:wrap; gap:16px; align-items:center; font-size:12px; font-weight:700; color:var(--text-primary);">
                    <label style="cursor:pointer;"><input type="checkbox" id="autoplayToggle" checked> Autoplay</label>
                    <label style="cursor:pointer;"><input type="checkbox" id="autoSkipToggle" checked> Auto Skip Intro</label>
                    <label style="cursor:pointer;"><input type="checkbox" id="autoNextToggle" checked> Auto Next</label>
                </div>
            </main>

            <aside class="player-sidebar-right">
                <div class="control-widget-card" style="background:var(--bg-input); padding:12px; border-radius:6px;">
                    <div class="section-label-heading" style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Select Stream Language Target</div>
                    <div class="routing-selection-matrix" id="languageSelectionDeck"></div>
                </div>

                <div class="control-widget-card" style="background:var(--bg-input); padding:12px; border-radius:6px;">
                    <div class="section-label-heading" style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Select Media Stream Server Link</div>
                    <div class="routing-selection-matrix" id="serverSelectionDeck"></div>
                </div>

                <div class="control-widget-card" style="background:var(--bg-input); padding:12px; border-radius:6px;">
                    <div class="section-label-heading" style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Select Subtitle Stream Layer</div>
                    <div class="routing-selection-matrix" id="subtitleSelectionDeck"></div>
                </div>

                <div class="control-widget-card" style="background:var(--bg-input); padding:12px; border-radius:6px;">
                    <div class="section-label-heading" style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Alternative Mobile Mirror Access</div>
                    <div class="telegram-routing-block" id="telegramDeckContainer"></div>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
